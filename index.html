<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NizeWeak - Xem YouTube Trực Tiếp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid #272727;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            background: none; border: none; color: #fff;
            font-size: 24px; cursor: pointer;
            padding: 8px; border-radius: 50%;
        }

        .menu-btn:hover { background: #272727; }

        .logo {
            display: flex; align-items: center; gap: 2px;
            text-decoration: none; color: #fff; cursor: pointer;
        }

        .logo-icon {
            background: #ff0000; border-radius: 6px;
            width: 32px; height: 22px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-icon::after {
            content: '';
            width: 0; height: 0;
            border-left: 10px solid #fff;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            margin-left: 3px;
        }

        .logo-text { font-size: 20px; font-weight: bold; }

        /* ===== SEARCH ===== */
        .search-container {
            display: flex; align-items: center;
            flex: 1; max-width: 640px; margin: 0 40px;
        }

        .search-box {
            flex: 1; display: flex;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            overflow: hidden;
        }

        .search-box:focus-within { border-color: #1c62b9; }

        .search-input {
            flex: 1; background: #121212;
            border: none; color: #fff;
            padding: 8px 16px; font-size: 16px; outline: none;
        }

        .search-input::placeholder { color: #888; }

        .search-btn {
            background: #222; border: none;
            border-left: 1px solid #303030;
            padding: 0 24px; cursor: pointer;
            color: #fff; font-size: 18px;
            border-radius: 0 40px 40px 0;
        }

        .search-btn:hover { background: #333; }

        .header-right { display: flex; align-items: center; gap: 8px; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%; background: #c00;
            display: flex; align-items: center;
            justify-content: center; font-size: 14px; cursor: pointer;
        }

        /* ===== URL INPUT ===== */
        .url-section {
            background: #1a1a1a;
            border-bottom: 1px solid #272727;
            padding: 12px 16px;
            display: flex; gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .url-section label {
            font-size: 13px; color: #aaa;
            white-space: nowrap;
        }

        .url-input {
            flex: 1; min-width: 200px;
            background: #121212; border: 1px solid #303030;
            color: #fff; padding: 8px 12px;
            border-radius: 8px; font-size: 14px; outline: none;
        }

        .url-input:focus { border-color: #1c62b9; }

        .url-btn {
            background: #1c62b9; border: none;
            color: #fff; padding: 8px 16px;
            border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500;
            white-space: nowrap;
        }

        .url-btn:hover { background: #1e6fc7; }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 56px; left: 0;
            width: 240px;
            height: calc(100vh - 56px);
            background: #0f0f0f;
            overflow-y: auto;
            padding: 12px 0;
            z-index: 900;
        }

        .sidebar-item {
            display: flex; align-items: center;
            gap: 24px; padding: 10px 24px;
            color: #f1f1f1; text-decoration: none;
            font-size: 14px; cursor: pointer;
        }

        .sidebar-item:hover { background: #272727; }
        .sidebar-item.active { background: #272727; }

        .sidebar-item span:first-child {
            font-size: 20px; width: 24px; text-align: center;
        }

        .sidebar-divider {
            height: 1px; background: #272727; margin: 12px 0;
        }

        /* ===== MAIN ===== */
        .main {
            margin-left: 240px;
            margin-top: 56px;
        }

        /* ===== CHIPS ===== */
        .chips-container {
            display: flex; gap: 12px;
            padding: 12px 16px;
            overflow-x: auto;
            position: sticky; top: 56px;
            background: #0f0f0f; z-index: 100;
        }

        .chip {
            background: #272727; color: #f1f1f1;
            border: none; padding: 8px 16px;
            border-radius: 8px; font-size: 14px;
            cursor: pointer; white-space: nowrap;
        }

        .chip:hover { background: #3a3a3a; }
        .chip.active { background: #f1f1f1; color: #0f0f0f; }

        /* ===== VIDEO GRID ===== */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px; padding: 16px;
        }

        .video-card { cursor: pointer; }

        .thumbnail-container {
            position: relative; width: 100%;
            padding-top: 56.25%;
            border-radius: 12px; overflow: hidden;
            background: #1a1a1a;
        }

        .thumbnail {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }

        .duration {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px; border-radius: 4px;
            font-size: 12px;
        }

        .video-info { display: flex; gap: 12px; padding: 12px 0; }

        .channel-avatar {
            width: 36px; height: 36px;
            border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center;
            justify-content: center; font-size: 16px;
        }

        .video-meta { flex: 1; }

        .video-title {
            font-size: 14px; font-weight: 500;
            line-height: 1.4; color: #f1f1f1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel { font-size: 13px; color: #aaa; margin-top: 4px; }
        .video-stats { font-size: 13px; color: #aaa; }

        /* ===== PLAYER ===== */
        .player-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000; overflow-y: auto;
        }

        .player-overlay.active { display: block; }

        .player-container {
            max-width: 1100px;
            margin: 0 auto; padding: 20px;
        }

        .player-close {
            position: fixed; top: 16px; right: 16px;
            background: rgba(255,255,255,0.1);
            border: none; color: #fff;
            width: 40px; height: 40px;
            border-radius: 50%; font-size: 24px;
            cursor: pointer; z-index: 2001;
        }

        .player-close:hover { background: rgba(255,255,255,0.2); }

        .video-player {
            width: 100%; aspect-ratio: 16/9;
            border-radius: 12px; overflow: hidden;
            background: #000;
        }

        .video-player iframe {
            width: 100%; height: 100%; border: none;
        }

        .player-info { padding: 16px 0; }

        .player-title {
            font-size: 20px; font-weight: 600; margin-bottom: 12px;
        }

        .player-actions {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        .action-btn {
            background: #272727; border: none;
            color: #f1f1f1; padding: 8px 16px;
            border-radius: 20px; font-size: 14px;
            cursor: pointer; display: flex;
            align-items: center; gap: 6px;
        }

        .action-btn:hover { background: #3a3a3a; }

        /* ===== LOADING ===== */
        .loading {
            text-align: center; padding: 60px; color: #aaa;
        }

        .loading-spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #1c62b9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== NO RESULTS ===== */
        .no-results {
            grid-column: 1/-1; text-align: center;
            padding: 60px; color: #aaa;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .video-grid { grid-template-columns: 1fr; }
            .search-container { margin: 0 16px; }
        }

        @media (max-width: 480px) {
            .search-container { max-width: 200px; margin: 0 8px; }
            .url-section { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="logo" onclick="goHome()">
                <div class="logo-icon"></div>
                <span class="logo-text">MyTube</span>
            </div>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" 
                       placeholder="Tìm kiếm trên YouTube..." 
                       onkeypress="if(event.key==='Enter')searchYouTube()">
            </div>
            <button class="search-btn" onclick="searchYouTube()">🔍</button>
        </div>

        <div class="header-right">
            <div class="avatar">U</div>
        </div>
    </header>

    <!-- URL INPUT -->
    <div class="url-section" style="margin-top:56px;">
        <label>🔗 Dán link YouTube:</label>
        <input type="text" class="url-input" id="urlInput" 
               placeholder="https://www.youtube.com/watch?v=...">
        <button class="url-btn" onclick="playFromUrl()">▶ Phát video</button>
    </div>

    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
        <a class="sidebar-item active" onclick="goHome()"><span>🏠</span> Trang chủ</a>
        <a class="sidebar-item" onclick="searchYouTube('music')"><span>🎵</span> Âm nhạc</a>
        <a class="sidebar-item" onclick="searchYouTube('gaming')"><span>🎮</span> Trò chơi</a>
        <a class="sidebar-item" onclick="searchYouTube('news')"><span>📰</span> Tin tức</a>
        <a class="sidebar-item" onclick="searchYouTube('programming')"><span>💻</span> Lập trình</a>
        <a class="sidebar-item" onclick="searchYouTube('sports')"><span>⚽</span> Thể thao</a>
        <a class="sidebar-item" onclick="searchYouTube('cooking')"><span>🍳</span> Nấu ăn</a>

        <div class="sidebar-divider"></div>

        <a class="sidebar-item" onclick="searchYouTube('trending vietnam')"><span>🔥</span> Thịnh hành VN</a>
        <a class="sidebar-item" onclick="searchYouTube('nhac viet')"><span>🇻🇳</span> Nhạc Việt</a>
        <a class="sidebar-item" onclick="searchYouTube('hai huoc')"><span>😂</span> Hài hước</a>

        <div class="sidebar-divider"></div>

        <a class="sidebar-item"><span>⚙️</span> Cài đặt</a>
    </nav>

    <!-- MAIN -->
    <main class="main" id="mainContent">
        <!-- Chips -->
        <div class="chips-container">
            <button class="chip active" onclick="searchYouTube('')">Tất cả</button>
            <button class="chip" onclick="searchYouTube('music')">Âm nhạc</button>
            <button class="chip" onclick="searchYouTube('gaming')">Trò chơi</button>
            <button class="chip" onclick="searchYouTube('news')">Tin tức</button>
            <button class="chip" onclick="searchYouTube('programming')">Lập trình</button>
            <button class="chip" onclick="searchYouTube('live')">Trực tiếp</button>
            <button class="chip" onclick="searchYouTube('sports')">Thể thao</button>
            <button class="chip" onclick="searchYouTube('cooking')">Nấu ăn</button>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Đang tải video...</p>
            </div>
        </div>
    </main>

    <!-- PLAYER -->
    <div class="player-overlay" id="playerOverlay">
        <button class="player-close" onclick="closePlayer()">✕</button>
        <div class="player-container">
            <div class="video-player" id="videoPlayer"></div>
            <div class="player-info">
                <h1 class="player-title" id="playerTitle"></h1>
                <div class="player-actions">
                    <button class="action-btn" onclick="openOnYouTube()">↗️ Xem trên YouTube</button>
                    <button class="action-btn" onclick="copyLink()">📋 Sao chép link</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIG =====
        // Get your free API key: https://console.cloud.google.com/
        // Enable YouTube Data API v3
        const API_KEY = 'YOUR_API_KEY_HERE';

        let currentVideoId = null;

        // ===== EXTRACT VIDEO ID =====
        function extractVideoId(url) {
            if (!url) return null;
            
            // Direct ID (11 chars)
            if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
            
            // Various YouTube URL formats
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/watch\?.*v=([a-zA-Z0-9_-]{11})/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            
            return null;
        }

        // ===== PLAY FROM URL =====
        function playFromUrl() {
            const url = document.getElementById('urlInput').value.trim();
            const videoId = extractVideoId(url);

            if (videoId) {
                openPlayer(videoId);
            } else {
                alert('❌ Link YouTube không hợp lệ!\n\nVí dụ:\n• https://www.youtube.com/watch?v=dQw4w9WgXcQ\n• https://youtu.be/dQw4w9WgXcQ\n• dQw4w9WgXcQ');
            }
        }

        // ===== SEARCH YOUTUBE =====
        async function searchYouTube(query = '') {
            if (!query) {
                query = document.getElementById('searchInput').value.trim() || 'trending vietnam 2024';
            }

            document.getElementById('searchInput').value = query;

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Đang tìm kiếm: "${query}"...</p>
                </div>
            `;

            // If API key is set, use YouTube Data API
            if (API_KEY !== 'YOUR_API_KEY_HERE') {
                try {
                    const res = await fetch(
                        `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`
                    );
                    const data = await res.json();

                    if (data.items && data.items.length > 0) {
                        renderSearchResults(data.items);
                        return;
                    }
                } catch (error) {
                    console.error('API Error:', error);
                }
            }

            // Fallback: Use Invidious API (no key needed)
            try {
                const res = await fetch(
                    `https://inv.tux.pizza/api/v1/search?q=${encodeURIComponent(query)}&type=video`
                );
                const data = await res.json();

                if (data && data.length > 0) {
                    renderInvidiousResults(data);
                    return;
                }
            } catch (error) {
                console.error('Invidious Error:', error);
            }

            // Final fallback: Default videos
            renderDefaultVideos();
        }

        // ===== RENDER SEARCH RESULTS (YouTube API) =====
        function renderSearchResults(items) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = items.map(item => {
                const videoId = item.id.videoId;
                const title = item.snippet.title;
                const channel = item.snippet.channelTitle;
                const thumbnail = item.snippet.thumbnails.medium?.url 
                               || item.snippet.thumbnails.default?.url;

                return `
                    <div class="video-card" onclick="openPlayer('${videoId}')">
                        <div class="thumbnail-container">
                            <img class="thumbnail" src="${thumbnail}" alt="${title}">
                        </div>
                        <div class="video-info">
                            <div class="channel-avatar" style="background:#${randomColor()}">
                                ${channel.charAt(0).toUpperCase()}
                            </div>
                            <div class="video-meta">
                                <div class="video-title">${title}</div>
                                <div class="video-channel">${channel}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== RENDER INVIDIOUS RESULTS =====
        function renderInvidiousResults(items) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = items.map(item => {
                const videoId = item.videoId;
                const title = item.title;
                const channel = item.author || 'Unknown';
                const views = item.viewCount ? formatNumber(item.viewCount) + ' lượt xem' : '';
                const duration = item.lengthSeconds ? formatDuration(item.lengthSeconds) : '';
                const thumbnail = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;

                return `
                    <div class="video-card" onclick="openPlayer('${videoId}')">
                        <div class="thumbnail-container">
                            <img class="thumbnail" src="${thumbnail}" alt="${title}">
                            ${duration ? `<span class="duration">${duration}</span>` : ''}
                        </div>
                        <div class="video-info">
                            <div class="channel-avatar" style="background:#${randomColor()}">
                                ${channel.charAt(0).toUpperCase()}
                            </div>
                            <div class="video-meta">
                                <div class="video-title">${title}</div>
                                <div class="video-channel">${channel}</div>
                                <div class="video-stats">${views}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== DEFAULT VIDEOS =====
        function renderDefaultVideos() {
            const defaults = [
                { id: "dQw4w9WgXcQ", title: "Rick Astley - Never Gonna Give You Up", channel: "Rick Astley", color: "e44" },
                { id: "9bZkp7q19f0", title: "PSY - GANGNAM STYLE", channel: "officialpsy", color: "c4a" },
                { id: "kJQP7kiw5Fk", title: "Luis Fonsi - Despacito", channel: "Luis Fonsi", color: "fa3" },
                { id: "JGwWNGJdvx8", title: "Ed Sheeran - Shape of You", channel: "Ed Sheeran", color: "e94" },
                { id: "rfscVS0vtbw", title: "Learn Python - Full Course", channel: "freeCodeCamp", color: "0a0" },
                { id: "PkZNo7MFNFg", title: "Learn JavaScript Full Course", channel: "freeCodeCamp", color: "0a0" },
                { id: "2Vv-BfVoq4g", title: "Android Development for Beginners", channel: "CodingWithMitch", color: "f72" },
                { id: "XqZsoesa55w", title: "Baby Shark Dance", channel: "Pinkfong", color: "f7a" },
                { id: "jNQXAC9IVRw", title: "Me at the zoo - First YouTube Video", channel: "jawed", color: "4a9" },
                { id: "Oz5x3lEPqHs", title: "Minecraft Official Trailer", channel: "Minecraft", color: "5a5" },
                { id: "hY7m5kkJdWM", title: "Coding Adventure: Chess", channel: "Sebastian Lague", color: "48f" },
                { id: "9Auq9mYxFEE", title: "Breaking News Live", channel: "News Live", color: "d33" }
            ];

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = defaults.map(v => `
                <div class="video-card" onclick="openPlayer('${v.id}')">
                    <div class="thumbnail-container">
                        <img class="thumbnail" 
                             src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" 
                             alt="${v.title}">
                    </div>
                    <div class="video-info">
                        <div class="channel-avatar" style="background:#${v.color}">
                            ${v.channel.charAt(0)}
                        </div>
                        <div class="video-meta">
                            <div class="video-title">${v.title}</div>
                            <div class="video-channel">${v.channel}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ===== OPEN PLAYER =====
        function openPlayer(videoId) {
            currentVideoId = videoId;
            const overlay = document.getElementById('playerOverlay');
            const player = document.getElementById('videoPlayer');

            // Embed YouTube video directly - THIS IS REAL YOUTUBE!
            player.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
                        allowfullscreen 
                        allow="autoplay; encrypted-media; picture-in-picture">
                </iframe>
            `;

            document.getElementById('playerTitle').textContent = 'Đang phát...';

            // Try to get video info
            fetchVideoInfo(videoId);

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ===== FETCH VIDEO INFO =====
        async function fetchVideoInfo(videoId) {
            try {
                const res = await fetch(`https://inv.tux.pizza/api/v1/videos/${videoId}`);
                const data = await res.json();

                if (data.title) {
                    document.getElementById('playerTitle').textContent = data.title;
                }
            } catch (e) {
                document.getElementById('playerTitle').textContent = 'Video YouTube';
            }
        }

        // ===== CLOSE PLAYER =====
        function closePlayer() {
            const overlay = document.getElementById('playerOverlay');
            document.getElementById('videoPlayer').innerHTML = '';
            overlay.classList.remove('active');
            document.body.style.overflow = '';
            currentVideoId = null;
        }

        // ===== OPEN ON YOUTUBE =====
        function openOnYouTube() {
            if (currentVideoId) {
                window.open(`https://www.youtube.com/watch?v=${currentVideoId}`, '_blank');
            }
        }

        // ===== COPY LINK =====
        function copyLink() {
            if (currentVideoId) {
                const url = `https://www.youtube.com/watch?v=${currentVideoId}`;
                navigator.clipboard.writeText(url).then(() => {
                    alert('✅ Đã sao chép link!');
                }).catch(() => {
                    prompt('Sao chép link:', url);
                });
            }
        }

        // ===== UTILITIES =====
        function formatNumber(num) {
            num = parseInt(num);
            if (num >= 1000000000) return (num / 1000000000).toFixed(1) + 'T';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        function formatDuration(seconds) {
            seconds = parseInt(seconds);
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;

            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            return `${m}:${s.toString().padStart(2,'0')}`;
        }

        function randomColor() {
            return Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('mainContent');
            if (sidebar.style.display === 'none') {
                sidebar.style.display = '';
                main.style.marginLeft = '240px';
            } else {
                sidebar.style.display = 'none';
                main.style.marginLeft = '0';
            }
        }

        function goHome() {
            document.getElementById('searchInput').value = '';
            renderDefaultVideos();
        }

        // ===== ESC KEY =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closePlayer();
        });

        // ===== INIT =====
        renderDefaultVideos();
    </script>

</body>
</html>
