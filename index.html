<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube No Ads - Tìm kiếm & Xem không quảng cáo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
        }
        h1 {
            font-size: 1.8rem;
            color: #ff0000;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            background: #121212;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .search-bar input:focus {
            border-color: #ff0000;
        }
        .search-bar button {
            background: #ff0000;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-bar button:hover {
            background: #cc0000;
        }
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .filter-btn {
            background: #272727;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .filter-btn.active {
            background: #ff0000;
        }
        .player-section {
            margin-bottom: 30px;
            display: none;
        }
        .player-section.active {
            display: block;
        }
        .player-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .player-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-player {
            background: #272727;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            margin-top: 12px;
            cursor: pointer;
            font-size: 14px;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .video-card {
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
            background: #202020;
        }
        .thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #2c2c2c;
        }
        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-channel {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }
        .video-stats {
            font-size: 12px;
            color: #aaa;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .feature-badge {
            display: inline-block;
            background: #2c2c2c;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 10px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .results-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🎬 YouTube No Ads</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Tìm kiếm video... (ví dụ: nhạc chill, game, hài)" autocomplete="off">
            <button id="searchBtn">🔍 Tìm kiếm</button>
        </div>
        <div class="filter-bar">
            <button class="filter-btn active" data-type="video">📹 Video</button>
            <button class="filter-btn" data-type="playlist">📋 Playlist</button>
            <button class="filter-btn" data-type="channel">📺 Kênh</button>
        </div>
        <div class="info">
            <span class="feature-badge">🚫 Không quảng cáo</span>
            <span class="feature-badge">📱 Xem nền (tắt màn hình vẫn nghe)</span>
            <span class="feature-badge">🔄 Lặp lại tự động</span>
        </div>
    </header>

    <!-- Player -->
    <div class="player-section" id="playerSection">
        <div class="player-container">
            <iframe id="youtubePlayer" 
                    src="about:blank"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
            </iframe>
        </div>
        <button class="close-player" id="closePlayer">✖ Đóng video</button>
    </div>

    <!-- Kết quả tìm kiếm -->
    <div id="resultsContainer">
        <div class="loading">🔍 Nhập từ khóa để tìm kiếm video...</div>
    </div>
</div>

<script>
    // ========== CẤU HÌNH ==========
    // Dùng API không cần key thông qua invidious (proxy)
    const INVIOUS_INSTANCE = "https://invidious.io.lol";
    let currentSearchType = "video";
    
    // DOM elements
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const playerSection = document.getElementById('playerSection');
    const youtubePlayer = document.getElementById('youtubePlayer');
    const closePlayer = document.getElementById('closePlayer');
    const filterBtns = document.querySelectorAll('.filter-btn');

    // ========== HÀM GỌI API TÌM KIẾM ==========
    async function searchYouTube(query, type = 'video') {
        if (!query) return [];
        
        let typeParam = 'video';
        if (type === 'playlist') typeParam = 'playlist';
        if (type === 'channel') typeParam = 'channel';
        
        const url = `${INVIOUS_INSTANCE}/api/v1/search?q=${encodeURIComponent(query)}&type=${typeParam}&sort=relevance`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('API error');
            const data = await response.json();
            return data;
        } catch (error) {
            console.error('Lỗi tìm kiếm:', error);
            return [];
        }
    }

    // ========== HIỂN THỊ KẾT QUẢ ==========
    function displayResults(results, type) {
        if (!results || results.length === 0) {
            resultsContainer.innerHTML = '<div class="no-results">😞 Không tìm thấy kết quả. Hãy thử từ khóa khác.</div>';
            return;
        }

        let html = '<div class="results-grid">';
        
        for (const item of results) {
            if (type === 'video' && item.type === 'video') {
                const title = item.title || 'Không tiêu đề';
                const author = item.author || 'Unknown';
                const views = item.viewCount ? `${formatNumber(item.viewCount)} lượt xem` : '';
                const duration = item.lengthSeconds ? formatDuration(item.lengthSeconds) : '';
                const thumbnail = item.videoThumbnails?.[0]?.url || item.thumbnailUrl || '';
                
                html += `
                    <div class="video-card" data-video-id="${item.videoId}" data-type="video">
                        <div class="thumbnail">
                            <img src="${thumbnail}" alt="thumbnail" loading="lazy">
                            ${duration ? `<span class="duration">${duration}</span>` : ''}
                        </div>
                        <div class="video-info">
                            <div class="video-title">${escapeHtml(title)}</div>
                            <div class="video-channel">${escapeHtml(author)}</div>
                            <div class="video-stats">${views}</div>
                        </div>
                    </div>
                `;
            } 
            else if (type === 'playlist' && item.type === 'playlist') {
                const title = item.title || 'Playlist không tên';
                const author = item.author || 'Unknown';
                const videoCount = item.videoCount ? `${item.videoCount} video` : '';
                const thumbnail = item.playlistThumbnail || '';
                
                html += `
                    <div class="video-card" data-playlist-id="${item.playlistId}" data-type="playlist">
                        <div class="thumbnail">
                            <img src="${thumbnail}" alt="thumbnail" loading="lazy">
                        </div>
                        <div class="video-info">
                            <div class="video-title">📋 ${escapeHtml(title)}</div>
                            <div class="video-channel">${escapeHtml(author)}</div>
                            <div class="video-stats">${videoCount}</div>
                        </div>
                    </div>
                `;
            }
            else if (type === 'channel' && item.type === 'channel') {
                const name = item.author || 'Kênh không tên';
                const subscribers = item.subCount ? `${formatNumber(item.subCount)} subscribers` : '';
                const thumbnail = item.authorThumbnails?.[0]?.url || '';
                
                html += `
                    <div class="video-card" data-channel-id="${item.authorId}" data-type="channel">
                        <div class="thumbnail">
                            <img src="${thumbnail}" alt="avatar" loading="lazy" style="border-radius: 50%; width: 80px; margin: 20px auto; display: block;">
                        </div>
                        <div class="video-info">
                            <div class="video-title">📺 ${escapeHtml(name)}</div>
                            <div class="video-stats">${subscribers}</div>
                        </div>
                    </div>
                `;
            }
        }
        
        html += '</div>';
        resultsContainer.innerHTML = html;
        
        // Gắn sự kiện click cho video cards
        document.querySelectorAll('.video-card[data-video-id]').forEach(card => {
            card.addEventListener('click', () => {
                const videoId = card.dataset.videoId;
                playVideo(videoId);
            });
        });
    }

    // ========== PHÁT VIDEO (không QC, chạy nền) ==========
    function playVideo(videoId) {
        const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}&controls=1&modestbranding=1&rel=0&disablekb=1&iv_load_policy=3&fs=1`;
        youtubePlayer.src = embedUrl;
        playerSection.classList.add('active');
        playerSection.scrollIntoView({ behavior: 'smooth' });
    }

    // ========== ĐÓNG PLAYER ==========
    closePlayer.addEventListener('click', () => {
        youtubePlayer.src = 'about:blank';
        playerSection.classList.remove('active');
    });

    // ========== HÀM TIỆN ÍCH ==========
    function formatNumber(num) {
        if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    function formatDuration(seconds) {
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;
        if (hrs > 0) return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        return `${mins}:${secs.toString().padStart(2,'0')}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== TÌM KIẾM CHÍNH ==========
    async function performSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            resultsContainer.innerHTML = '<div class="loading">🔍 Nhập từ khóa để tìm kiếm...</div>';
            return;
        }
        
        resultsContainer.innerHTML = '<div class="loading">⏳ Đang tìm kiếm... vui lòng chờ</div>';
        
        const results = await searchYouTube(query, currentSearchType);
        displayResults(results, currentSearchType);
    }

    // ========== SỰ KIỆN ==========
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') performSearch();
    });
    
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentSearchType = btn.dataset.type;
            if (searchInput.value.trim()) {
                performSearch();
            }
        });
    });
    
    // Tìm kiếm gợi ý ban đầu (optional)
    // performSearch();
</script>
</body>
</html>
